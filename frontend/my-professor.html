<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Professor — ResearchHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-wrapper">
        <div class="content-body animate-in">
            <div class="header-row">
                <div>
                    <h1>My Professor</h1>
                    <p>Manage your supervisor assignment and faculty directory</p>
                </div>
            </div>

            <!-- Current Supervisor -->
            <div id="supervisorSection" class="panel" style="margin-bottom:2rem">
                <div class="panel-head"><h3>Current Supervisor</h3></div>
                <div id="supervisorContent"><div class="empty-state">Loading...</div></div>
            </div>

            <!-- Upcoming Meetings Section -->
            <div id="meetingsSection" class="panel" style="margin-bottom:2rem; display:none">
                <div class="panel-head">
                    <h3>Upcoming Meetings</h3>
                    <p style="font-size:0.82rem;color:var(--text-muted);font-weight:400">Track your scheduled academic discussions</p>
                </div>
                <div id="meetingsContent" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:1.25rem; margin-top:1.25rem">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <!-- Modal: Schedule Meeting -->
            <div id="scheduleModal" class="notification-modal">
                <div class="notif-modal-content" style="max-width:500px">
                    <div class="notif-modal-header">
                        <div class="notif-modal-title">
                            <span class="notif-modal-icon-wrap"><i class="fas fa-calendar-plus"></i></span>
                            <h2>Schedule Meeting</h2>
                        </div>
                        <button class="notif-close-btn" onclick="closeMeetingModal()"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="notif-modal-body" style="padding:1.5rem">
                        <div class="form-group">
                            <label>Meeting Title</label>
                            <input type="text" id="meetTitle" class="form-control" placeholder="e.g. Thesis Progress Review">
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem">
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="meetDate" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Time</label>
                                <input type="time" id="meetTime" class="form-control">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Context / Notes</label>
                            <textarea id="meetNotes" class="form-control" style="height:100px; resize:none" placeholder="What would you like to discuss?"></textarea>
                        </div>
                        <button class="btn-auth" id="confirmScheduleBtn" onclick="confirmSchedule()">Confirm Schedule</button>
                    </div>
                </div>
            </div>

            <!-- Request / Pending Status -->
            <div id="requestSection" class="panel" style="margin-bottom:2rem">
                <div class="panel-head"><h3>My Supervisor Requests</h3></div>
                <div id="requestContent"><div class="empty-state">Loading...</div></div>
            </div>

            <!-- Request / Pending Status -->
            <div id="requestSection" class="panel" style="margin-bottom:2rem; display:none">
                <div class="panel-head"><h3>My Supervisor Requests</h3></div>
                <div id="requestContent"><div class="empty-state">Loading...</div></div>
            </div>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
const user = requireAuth('scholar');
let scholarId = null, existingRequests = [];
let supervisorId = null, supervisorUserId = null;

async function init() {
    renderSidebar('my-professor.html');
    try {
        const s = await apiGet(`/scholar/${user.scholar_id || user.id}`);
        scholarId        = s.id;
        supervisorId     = s.supervisor_id;
        supervisorUserId = s.supervisor_user_id;

        // Render current supervisor
        renderSupervisor(s);

        // Load meetings
        if (scholarId) loadMeetings();

        // Load request history
        await loadRequests();
    } catch(e) { console.error(e); }
}

async function loadMeetings() {
    const cont = document.getElementById('meetingsContent');
    const sec  = document.getElementById('meetingsSection');
    try {
        const meetings = await apiGet(`/meetings/scholar/${scholarId}`);
        if (!meetings.length) {
            sec.style.display = 'none';
            return;
        }
        sec.style.display = 'block';
        cont.innerHTML = meetings.map(m => {
            const date = new Date(m.scheduled_at);
            const statusClass = m.status === 'scheduled' ? 'badge-warning' : (m.status === 'completed' ? 'badge-success' : 'badge-danger');
            return `
            <div class="panel" style="padding:1.25rem; border:1px solid var(--border); border-left:4px solid var(--primary)">
                <div style="display:flex; justify-content:space-between; margin-bottom:0.75rem">
                    <span class="badge ${statusClass}">${m.status}</span>
                    <span style="font-size:0.75rem; color:var(--text-muted)"><i class="fas fa-clock"></i> ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
                <h4 style="font-size:0.95rem; font-weight:700; margin-bottom:0.4rem">${m.title}</h4>
                <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:1rem">${date.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}</p>
                <div style="font-size:0.75rem; color:var(--primary); font-weight:600">
                    <i class="fas fa-video" style="margin-right:0.4rem"></i> Join Meeting
                </div>
            </div>`;
        }).join('');
    } catch(e) { console.error(e); }
}

function openMeetingModal() {
    document.getElementById('scheduleModal').style.display = 'flex';
    document.getElementById('scheduleModal').classList.add('open');
}

function closeMeetingModal() {
    const modal = document.getElementById('scheduleModal');
    modal.classList.remove('open');
    modal.classList.add('closing');
    setTimeout(() => {
        modal.style.display = 'none';
        modal.classList.remove('closing');
    }, 280);
}

async function confirmSchedule() {
    const title = document.getElementById('meetTitle').value;
    const date  = document.getElementById('meetDate').value;
    const time  = document.getElementById('meetTime').value;
    const notes = document.getElementById('meetNotes').value;

    if (!title || !date || !time) {
        toast('Please fill in title, date and time', 'error');
        return;
    }

    const scheduled_at = `${date}T${time}:00`;
    const btn = document.getElementById('confirmScheduleBtn');
    btn.disabled = true;
    btn.textContent = 'Scheduling...';

    try {
        await apiPost('/meetings/', {
            scholar_id: scholarId,
            supervisor_id: supervisorId,
            receiver_user_id: supervisorUserId,
            title,
            scheduled_at,
            notes
        });
        toast('Meeting requested successfully!');
        closeMeetingModal();
        loadMeetings();
    } catch(err) {
        toast(err.error || 'Failed to schedule', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Confirm Schedule';
    }
}

function renderSupervisor(s) {
    const sec = document.getElementById('supervisorContent');
    if (s.supervisor_id && s.supervisor_name) {
        const initials = s.supervisor_name.replace('Dr. ','').split(' ').map(n=>n[0]).join('').toUpperCase();
        
        // Dynamic Tags (Mocked for premium feel)
        const tags = ['Advanced AI', 'Research Methodology', 'Deep Learning', 'System Architecture'];
        const tagsHTML = tags.map(t => `<span style="background:rgba(0,212,255,0.08);color:var(--primary);font-size:0.7rem;padding:0.3rem 0.7rem;border-radius:100px;font-weight:600;margin-right:0.4rem;border:1px solid rgba(0,212,255,0.15)">${t}</span>`).join('');

        sec.innerHTML = `
        <div style="display:flex; gap:2.5rem; flex-wrap:wrap">
            <!-- Left: Avatar & Main Info -->
            <div style="display:flex; align-items:center; gap:1.5rem; flex:1; min-width:300px;">
                <div class="avatar-circle" style="width:100px;height:100px;font-size:2.2rem; flex-shrink:0">${initials}</div>
                <div>
                    <h2 style="font-size:1.6rem;font-weight:700;margin-bottom:0.25rem">${s.supervisor_name}</h2>
                    <p style="color:var(--primary);font-weight:600;margin-bottom:0.4rem; font-size:0.95rem">Senior Research Supervisor</p>
                    <p style="color:var(--text-muted);font-size:0.85rem; margin-bottom:1rem"><i class="fas fa-university" style="margin-right:0.4rem"></i>${s.supervisor_dept || 'Department of Computer Science'}</p>
                    <div style="display:flex; flex-wrap:wrap; gap:0.25rem">
                        ${tagsHTML}
                    </div>
                </div>
            </div>

            <!-- Right: Office Info & Actions -->
            <div style="flex:1; min-width:300px; border-left:1px solid var(--border); padding-left:2.5rem; display:grid; grid-template-columns: 1fr 1fr; gap:1rem">
                <div>
                    <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; font-weight:700; letter-spacing:0.05rem; margin-bottom:0.5rem">Office Information</div>
                    <p style="font-size:0.88rem; margin-bottom:0.4rem"><i class="fas fa-door-open" style="width:18px; color:var(--primary)"></i> Room 402, Block B</p>
                    <p style="font-size:0.88rem; margin-bottom:0.4rem"><i class="fas fa-clock" style="width:18px; color:var(--primary)"></i> Mon/Wed: 2PM - 4PM</p>
                    <p style="font-size:0.88rem;"><i class="fas fa-envelope" style="width:18px; color:var(--primary)"></i> prof.${initials.toLowerCase()}@univ.edu</p>
                </div>
                <div style="display:flex; flex-direction:column; gap:0.6rem; justify-content:center">
                    <a href="messages.html" class="btn-auth" style="width:100%; padding:0.65rem; font-size:0.85rem; border-radius:10px">
                        <i class="fas fa-comment-dots" style="margin-right:0.5rem"></i> Message Faculty
                    </a>
                    <button class="btn-auth" style="width:100%; padding:0.65rem; font-size:0.85rem; border-radius:10px; background:rgba(255,255,255,0.05); border-color:var(--border); color:#fff" onclick="openMeetingModal()">
                        <i class="fas fa-calendar-check" style="margin-right:0.5rem"></i> Book a Slot
                    </button>
                </div>
            </div>
        </div>`;
    } else {
        sec.innerHTML = `<div class="empty-state"><i class="fas fa-user-clock" style="font-size:2.5rem;opacity:0.2;margin-bottom:1rem;display:block"></i>No supervisor assigned yet. Request one below.</div>`;
    }
}

async function loadRequests() {
    const cont = document.getElementById('requestContent');
    try {
        existingRequests = await apiGet(`/scholar/${scholarId}/supervisor-request`);
        if (!existingRequests.length) {
            cont.innerHTML = `<div class="empty-state">No requests sent yet</div>`;
            return;
        }
        cont.innerHTML = `<table style="width:100%;border-collapse:collapse">
            <thead><tr style="border-bottom:1px solid var(--border)">
                <th style="padding:0.6rem 0.5rem;font-size:0.8rem;color:var(--text-muted);font-weight:600;text-align:left;text-transform:uppercase">Supervisor</th>
                <th style="padding:0.6rem 0.5rem;font-size:0.8rem;color:var(--text-muted);font-weight:600;text-align:left;text-transform:uppercase">Sent On</th>
                <th style="padding:0.6rem 0.5rem;font-size:0.8rem;color:var(--text-muted);font-weight:600;text-align:left;text-transform:uppercase">Status</th>
            </tr></thead>
            <tbody>
                ${existingRequests.map(r=>`
                <tr style="border-bottom:1px solid rgba(255,255,255,0.03)">
                    <td style="padding:0.9rem 0.5rem;font-weight:600">${r.supervisor_name}</td>
                    <td style="padding:0.9rem 0.5rem;font-size:0.85rem;color:var(--text-muted)">${new Date(r.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</td>
                    <td style="padding:0.9rem 0.5rem"><span class="badge ${badgeClass(r.status)}">${r.status}</span></td>
                </tr>`).join('')}
            </tbody>
        </table>`;
    } catch(err) {
        cont.innerHTML = `<div class="empty-state">Failed to load requests</div>`;
    }
}

init();
</script>
</body>
</html>
